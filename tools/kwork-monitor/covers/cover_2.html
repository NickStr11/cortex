<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 660px;
  height: 440px;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  background: #0a0a0a;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 48px 56px;
}

.glow {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: #BF5AF2;
  filter: blur(130px);
  opacity: 0.13;
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
}

.label {
  color: #BF5AF2;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

h1 {
  color: #ffffff;
  font-size: 42px;
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

h1 span {
  color: #BF5AF2;
}

.sub {
  color: rgba(255,255,255,0.4);
  font-size: 15px;
  font-weight: 400;
  margin-bottom: 36px;
}

.tags {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.tag {
  background: rgba(191, 90, 242, 0.10);
  border: 1px solid rgba(191, 90, 242, 0.25);
  color: #BF5AF2;
  padding: 8px 18px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
}

.line {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: #BF5AF2;
}
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="label">AI & Knowledge Base</div>
  <h1><span>AI</span> чат-бот<br>для бизнеса.</h1>
  <div class="sub">RAG + LLM — отвечает на основе ваших документов</div>

  <div class="tags">
    <span class="tag">Claude / GPT</span>
    <span class="tag">RAG</span>
    <span class="tag">Telegram</span>
    <span class="tag">Web Widget</span>
  </div>

  <div class="line"></div>
</body>
</html>
